<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Research Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>Trial2Criteria</h1>
            <p>Enter a trial title to initiate a comprehensive clinical trial design stream.</p>
        </div>

        <div class="poster-container">
            <img src="{{ url_for('static', path='/poster.jpg') }}" alt="Medical Research Poster">
        </div>

        <form id="research-form" class="research-form">
            <textarea id="research-title" placeholder="Enter your medical research title here..." rows="4"></textarea>
            <button type="submit" id="submit-button">Analyze</button>
        </form>
        
        <footer class="sidebar-footer">
            <button id="download-button" class="download-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Download Full Prompt and Result
            </button>
            <p>&copy; 2024 AI-Powered Analysis Tool</p>
        </footer>
    </aside>

    <main class="main-content">
        <div id="results-container">
            <!-- Dynamic results will be populated here -->
            <div class="placeholder">
                <h2>Analysis Results</h2>
                <p>Your results will appear here once you start an analysis.</p>
            </div>
        </div>
        <div id="loader" class="loader" style="display: none;"></div>
        <div id="analysis-status" class="analysis-status" style="display: none;"></div>
    </main>
</div>

<script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
